<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fichalili — Control de Jornada</title>
<style>
/* ... Mantengo tus estilos originales para no romper el diseño ... */
:root {
  --bg: #080808; --s1: #111; --s2: #181818; --s3: #222;
  --bd: rgba(255,255,255,0.08); --acc: #c6f135; --txt: #f2f2f2;
  --txt2: #888; --txt3: #555; --ok: #3ddc84; --err: #ff5252;
  --warn: #ffb347; --info: #5eaeff; --r: 14px; --r-sm: 10px;
  --mono: 'SF Mono', monospace; --sans: -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);height:100vh;overflow:hidden}
.scr{display:none;height:100vh;flex-direction:column}
.scr.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:1rem}
.app-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem;background:var(--s1);border-bottom:1px solid var(--bd)}
.hdr-logo{font-family:var(--mono);color:var(--acc);letter-spacing:2px}
.btn-xs{background:none;border:1px solid var(--bd);color:var(--txt3);padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer}
.user-btn{display:flex;align-items:center;gap:12px;width:100%;background:var(--s2);border:1px solid var(--bd);padding:13px;border-radius:var(--r-sm);color:var(--txt);margin-bottom:8px;cursor:pointer}
.ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;background:var(--acc);color:#000}
.hero{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:2rem;text-align:center;margin-bottom:1rem}
.clock{font-size:48px;font-family:var(--mono)}
.btn-main{width:100%;max-width:260px;padding:16px;border-radius:var(--r);border:none;font-family:var(--mono);font-weight:bold;cursor:pointer;margin:10px auto;display:block}
.btn-in{background:var(--acc);color:#000}
.btn-out{background:rgba(255,82,82,0.1);color:var(--err);border:1px solid var(--err)}
.bnav{display:flex;background:var(--s1);border-top:1px solid var(--bd)}
.bnav-btn{flex:1;padding:15px;background:none;border:none;color:var(--txt3);font-family:var(--mono);font-size:11px;cursor:pointer}
.bnav-btn.on{color:var(--acc)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;align-items:flex-end}
.overlay.on{display:flex}
.sheet{background:var(--s1);width:100%;padding:2rem;border-radius:20px 20px 0 0;animation:up 0.3s ease-out}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.fgrp{margin-bottom:1rem}
.flbl{display:block;font-size:10px;color:var(--txt3);margin-bottom:5px;text-transform:uppercase}
.finp{width:100%;background:var(--s2);border:1px solid var(--bd);padding:12px;color:#fff;border-radius:8px}
.macts{display:flex;gap:10px;margin-top:1rem}
.btn-go{flex:1;padding:12px;background:var(--acc);border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-cancel{flex:1;padding:12px;background:none;border:1px solid var(--bd);color:var(--txt3);border-radius:8px;cursor:pointer}
.worker-mgmt-card{background:var(--s1);border:1px solid var(--bd);padding:1rem;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s2);padding:10px 20px;border-radius:100px;font-size:12px;border:1px solid var(--acc);opacity:0;transition:0.3s;z-index:1000}
.toast.show{opacity:1}
.tabs{display:flex;gap:5px;margin-bottom:1rem}
.tab{flex:1;padding:8px;background:var(--s2);border:none;color:var(--txt3);border-radius:5px;font-size:11px;cursor:pointer}
.tab.on{background:var(--acc);color:#000}
.tab-p{display:none}.tab-p.on{display:block}
</style>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="s-login" class="scr on">
  <div class="scroll" style="display:flex;flex-direction:column;justify-content:center;align-items:center">
    <h1 style="font-size:40px;margin-bottom:2rem">Fichalili</h1>
    <div id="user-list" style="width:100%;max-width:320px"></div>
  </div>
</div>

<!-- PANTALLA TRABAJADOR -->
<div id="s-worker" class="scr">
  <div class="app-hdr">
    <div class="hdr-logo">FICHALILI</div>
    <button class="btn-xs" onclick="logout()">SALIR</button>
  </div>
  <div class="scroll">
    <div id="wp-fichar">
      <div class="hero">
        <div class="clock" id="w-clock">00:00</div>
        <div id="w-date" style="color:var(--txt3);font-family:var(--mono);margin-bottom:1rem"></div>
        <div id="w-badge" style="display:inline-block;padding:5px 15px;border-radius:100px;font-size:12px;background:var(--s2)">FUERA</div>
        <button class="btn-main btn-in" id="w-btn-main" onclick="doFichar()">FICHAR ENTRADA</button>
        <div id="w-jtimer-row" style="display:none;margin-top:10px;font-family:var(--mono)">Jornada: <span id="w-jtimer" style="color:var(--acc)">0:00:00</span></div>
      </div>
    </div>
  </div>
  <div class="bnav">
    <button class="bnav-btn on">FICHAR</button>
    <button class="bnav-btn">HISTORIAL</button>
  </div>
</div>

<!-- PANTALLA ADMIN -->
<div id="s-admin" class="scr">
  <div class="app-hdr">
    <div class="hdr-logo">FICHALILI <span style="font-size:9px;color:var(--warn)">ADMIN</span></div>
    <button class="btn-xs" onclick="logout()">SALIR</button>
  </div>
  <div class="scroll">
    <div class="tabs">
      <button class="tab on" onclick="aTab('hoy')">HOY</button>
      <button class="tab" onclick="aTab('personal')">PERSONAL</button>
    </div>
    <div id="ap-hoy" class="tab-p on">
      <div style="background:var(--s1);padding:1rem;border-radius:10px;border:1px solid var(--bd)">
        <div style="font-size:12px;color:var(--txt3)">EMPLEADOS DENTRO</div>
        <div id="a-dentro" style="font-size:32px;color:var(--acc)">0</div>
      </div>
    </div>
    <div id="ap-personal" class="tab-p">
      <div id="a-workers-list"></div>
      <button class="btn-add-w" style="width:100%;padding:15px;background:var(--acc);border:none;border-radius:10px;font-weight:bold;margin-top:1rem" onclick="openAddWorker()">+ AÑADIR EMPLEADO</button>
    </div>
  </div>
</div>

<!-- MODAL AÑADIR/EDITAR -->
<div class="overlay" id="m-add-worker">
  <div class="sheet">
    <h3 id="mw-title">Añadir empleado</h3>
    <input type="hidden" id="mw-id">
    <div class="fgrp"><label class="flbl">Nombre</label><input type="text" class="finp" id="mw-nombre"></div>
    <div class="fgrp"><label class="flbl">Jornada (h)</label><input type="number" class="finp" id="mw-jornada" value="8"></div>
    <div class="fgrp"><label class="flbl">PIN (4 dígitos)</label><input type="password" class="finp" id="mw-pin" maxlength="4"></div>
    <div class="macts">
      <button class="btn-cancel" onclick="closeModal('m-add-worker')">CANCELAR</button>
      <button class="btn-go" onclick="saveWorker()">GUARDAR</button>
    </div>
  </div>
</div>

<!-- MODAL BORRAR -->
<div class="overlay" id="m-del-worker">
  <div class="sheet">
    <h3>Eliminar empleado</h3>
    <p style="color:var(--txt2);margin:1rem 0">¿Estás seguro de que quieres eliminar a <strong id="del-w-name"></strong>?</p>
    <input type="hidden" id="del-w-id">
    <div class="macts">
      <button class="btn-cancel" onclick="closeModal('m-del-worker')">CANCELAR</button>
      <button class="btn-go" style="background:var(--err);color:#fff" onclick="confirmDelWorker()">ELIMINAR</button>
    </div>
  </div>
</div>

<!-- MODAL PIN -->
<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center">
  <div id="pin-target-name" style="margin-bottom:1rem;font-size:20px"></div>
  <div style="font-size:12px;color:var(--txt3);margin-bottom:2rem">INTRODUCE TU PIN</div>
  <div id="pin-display" style="font-size:32px;letter-spacing:15px;margin-bottom:2rem;height:40px"></div>
  <div style="display:grid;grid-template-columns:repeat(3,70px);gap:15px" id="pin-pad"></div>
  <button onclick="cancelPin()" style="margin-top:2rem;background:none;border:1px solid var(--bd);color:var(--txt3);padding:10px 20px;border-radius:100px">CANCELAR</button>
</div>

<div class="toast" id="toast"></div>

<script>
// --- CONFIGURACIÓN ---
const CFG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbyy7wlpPoN-PwsBW_5JoO7DIqus6W0Erun7nUbcimD8aL3wTjqDrp06af4pPPZBJDPB/exec'
};

// --- ESTADO ---
let STATE = { user: null, pinBuffer: '' };
let WORKERS = JSON.parse(localStorage.getItem('workers')) || [
  { id: 'admin', nombre: 'Administrador', jornada: 8, pin: '0000', role: 'admin', activo: true }
];
let JORNADAS = JSON.parse(localStorage.getItem('jornadas_' + new Date().toISOString().split('T')[0])) || {};

// --- SINCRONIZACIÓN (LA CLAVE) ---
async function syncGAS(tipo, extra = {}) {
  if (!CFG.GAS_URL) return;
  const payload = { tipo, ...extra, userId: STATE.user?.id, nombre: STATE.user?.nombre, timestamp: new Date().toISOString() };
  
  // Enviamos como texto plano para evitar el bloqueo CORS de Google
  try {
    await fetch(CFG.GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    console.log("Sincronización enviada:", tipo);
  } catch (e) {
    console.error("Error de red:", e);
  }
}

// --- LOGICA TRABAJADORES ---
function selectUser(uid) {
  const user = WORKERS.find(w => w.id === uid);
  STATE.pinBuffer = '';
  document.getElementById('pin-display').textContent = '';
  document.getElementById('pin-target-name').textContent = user.nombre;
  document.getElementById('pin-modal').style.display = 'flex';
  renderPinPad(user);
}

function renderPinPad(user) {
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(n => {
    const b = document.createElement('button');
    b.textContent = n;
    b.style.cssText = "width:70px;height:70px;border-radius:50%;border:1px solid var(--bd);background:var(--s2);color:#fff;font-size:20px";
    b.onclick = () => {
      if (n === 'C') { STATE.pinBuffer = ''; }
      else if (n === 'OK') {
        if (STATE.pinBuffer === user.pin) {
          document.getElementById('pin-modal').style.display = 'none';
          STATE.user = user;
          user.role === 'admin' ? initAdmin() : initWorker();
        } else {
          showToast("PIN INCORRECTO", "t-err");
          STATE.pinBuffer = '';
        }
      } else {
        if (STATE.pinBuffer.length < 4) STATE.pinBuffer += n;
      }
      document.getElementById('pin-display').textContent = '•'.repeat(STATE.pinBuffer.length);
    };
    pad.appendChild(b);
  });
}

function cancelPin() { document.getElementById('pin-modal').style.display = 'none'; }

function doFichar() {
  const uid = STATE.user.id;
  if (!JORNADAS[uid]) {
    JORNADAS[uid] = { entrada: Date.now(), pausas: [], estado: 'dentro' };
    showToast("Entrada registrada", "t-ok");
    syncGAS('entrada');
  } else {
    const j = JORNADAS[uid];
    j.salida = Date.now();
    const horas = (j.salida - j.entrada) / 3600000;
    syncGAS('salida', { fecha: new Date().toISOString().split('T')[0], entrada: new Date(j.entrada).toLocaleTimeString(), salida: new Date(j.salida).toLocaleTimeString(), horas: horas.toFixed(2) });
    delete JORNADAS[uid];
    showToast("Salida registrada", "t-ok");
  }
  localStorage.setItem('jornadas_' + new Date().toISOString().split('T')[0], JSON.stringify(JORNADAS));
  renderWorkerStatus();
}

// --- LOGICA ADMIN ---
function renderAdminWorkers() {
  const list = document.getElementById('a-workers-list');
  list.innerHTML = WORKERS.filter(w => w.activo && w.id !== 'admin').map(w => `
    <div class="worker-mgmt-card">
      <div>
        <div style="font-weight:bold">${w.nombre}</div>
        <div style="font-size:11px;color:var(--txt3)">PIN: ${w.pin} | Jornada: ${w.jornada}h</div>
      </div>
      <div style="display:flex;gap:5px">
        <button class="btn-xs" onclick="editWorker('${w.id}')">EDITAR</button>
        <button class="btn-xs" style="color:var(--err)" onclick="promptDelWorker('${w.id}')">BORRAR</button>
      </div>
    </div>
  `).join('');
}

function openAddWorker() {
  document.getElementById('mw-id').value = '';
  document.getElementById('mw-nombre').value = '';
  document.getElementById('mw-pin').value = '';
  document.getElementById('mw-title').textContent = "Añadir empleado";
  openModal('m-add-worker');
}

function editWorker(id) {
  const w = WORKERS.find(x => x.id === id);
  document.getElementById('mw-id').value = w.id;
  document.getElementById('mw-nombre').value = w.nombre;
  document.getElementById('mw-jornada').value = w.jornada;
  document.getElementById('mw-pin').value = w.pin;
  document.getElementById('mw-title').textContent = "Editar empleado";
  openModal('m-add-worker');
}

function saveWorker() {
  const id = document.getElementById('mw-id').value || 'w' + Date.now();
  const nombre = document.getElementById('mw-nombre').value;
  const jornada = document.getElementById('mw-jornada').value;
  const pin = document.getElementById('mw-pin').value;

  if (!nombre || pin.length < 4) { showToast("Datos incompletos", "t-err"); return; }

  const workerData = { id, nombre, jornada, pin, activo: true, role: 'worker', timestamp: new Date().toISOString() };
  const idx = WORKERS.findIndex(w => w.id === id);
  
  if (idx > -1) WORKERS[idx] = workerData;
  else WORKERS.push(workerData);

  localStorage.setItem('workers', JSON.stringify(WORKERS));
  syncGAS('worker_save', workerData);
  closeModal('m-add-worker');
  renderAdminWorkers();
  renderLogin();
  showToast("Guardado correctamente", "t-ok");
}

function promptDelWorker(id) {
  const w = WORKERS.find(x => x.id === id);
  document.getElementById('del-w-id').value = id;
  document.getElementById('del-w-name').textContent = w.nombre;
  openModal('m-del-worker');
}

function confirmDelWorker() {
  const id = document.getElementById('del-w-id').value;
  const idx = WORKERS.findIndex(w => w.id === id);
  if (idx > -1) {
    WORKERS[idx].activo = false;
    localStorage.setItem('workers', JSON.stringify(WORKERS));
    syncGAS('worker_delete', { id });
    showToast("Empleado eliminado", "t-warn");
  }
  closeModal('m-del-worker');
  renderAdminWorkers();
  renderLogin();
}

// --- INICIALIZACIÓN ---
function initWorker() { showScr('s-worker'); renderWorkerStatus(); tickClock(); }
function initAdmin() { showScr('s-admin'); renderAdminWorkers(); }
function logout() { STATE.user = null; showScr('s-login'); renderLogin(); }
function renderLogin() {
  const list = document.getElementById('user-list');
  list.innerHTML = WORKERS.filter(w => w.activo).map(u => `
    <div class="user-btn" onclick="selectUser('${u.id}')">
      <div class="ava">${u.nombre[0]}</div>
      <div>
        <div style="font-weight:bold">${u.nombre}</div>
        <div style="font-size:12px;color:var(--txt3)">${u.role === 'admin' ? 'ADMINISTRADOR' : 'EMPLEADO'}</div>
      </div>
    </div>
  `).join('');
}

function renderWorkerStatus() {
  const uid = STATE.user.id;
  const j = JORNADAS[uid];
  const btn = document.getElementById('w-btn-main');
  const badge = document.getElementById('w-badge');
  if (!j) {
    btn.textContent = "FICHAR ENTRADA"; btn.className = "btn-main btn-in";
    badge.textContent = "FUERA"; badge.style.color = "var(--txt3)";
    document.getElementById('w-jtimer-row').style.display = 'none';
  } else {
    btn.textContent = "FICHAR SALIDA"; btn.className = "btn-main btn-out";
    badge.textContent = "EN JORNADA"; badge.style.color = "var(--acc)";
    document.getElementById('w-jtimer-row').style.display = 'block';
  }
}

function tickClock() {
  const now = new Date();
  document.getElementById('w-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('w-date').textContent = now.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
  if (STATE.user && JORNADAS[STATE.user.id]) {
    const diff = Date.now() - JORNADAS[STATE.user.id].entrada;
    document.getElementById('w-jtimer').textContent = new Date(diff).toISOString().substr(11, 8);
  }
  if (STATE.user) setTimeout(tickClock, 1000);
}

function showScr(id) { document.querySelectorAll('.scr').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }
function aTab(t) { document.querySelectorAll('.tab-p').forEach(p => p.classList.remove('on')); document.getElementById('ap-' + t).classList.add('on'); document.querySelectorAll('.tab').forEach(b => b.classList.remove('on')); event.target.classList.add('on'); }

function showToast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast', 3000);
}

renderLogin();
</script>
</body>
</html>
